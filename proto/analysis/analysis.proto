syntax = "proto3";

package analysis;

option go_package = "github.com/PavlentiyGo/notification-service/proto/analysis";

import "google/protobuf/timestamp.proto";
service AnalysisService{
  rpc GetStatistics(GetStatisticsRequest) returns (GetStatisticsResponse);
  rpc AddPayment(AddPaymentRequest) returns (AddPaymentResponse);
}

message GetStatisticsRequest{
  Currency total_currency = 1;
  int32 user_id = 2;

  bool this_month = 3;
}

message GetStatisticsResponse{
  string total_sum = 1;
  repeated PaymentList payments_list = 2;
}


message PaymentList{
  SubscriptionType payments_type = 1;
  string total_sum = 2;
  repeated string subscriptions_name = 3;
}

enum Currency{
  CURRENCY_UNSPECIFIED = 0;

  RUB = 1;
  EUR = 2;
  USD = 3;
}

enum SubscriptionType {
  TYPE_UNSPECIFIED = 0;

  STREAMING = 1;   // Нетфликс, Яндекс Плюс, Спотифай
  SOFTWARE = 2;    // JetBrains, ChatGPT Plus, Облако
  UTILITIES = 3;   // ЖКХ, интернет, мобильная связь
  FINANCE = 4;     // Кредиты, страховки, банковское обслуживание
  HEALTH = 5;      // Фитнес-клуб, доставка здоровой еды, витамины
  EDUCATION = 6;   // Курсы, онлайн-школы, подписки на книги
  OTHER = 7;       // Всё остальное
}

message AddPaymentRequest{
  int32 user_id = 1;
  int32 subscription_id = 2;
  
  SubscriptionType type = 3;
  string name = 4;
  Currency currency = 5;
  double price = 6;
}

message AddPaymentResponse{
  google.protobuf.Timestamp next_billing_at = 1;
}