syntax = "proto3";

package currency;

option go_package = "github.com/PavlentiyGo/notification-service/proto/currency";

service CurrencyService{
  rpc GetCurrentCurrency(GetCurrentCurrencyRequest) returns (GetCurrentCurrencyResponse);
}

message GetCurrentCurrencyRequest{
}

message GetCurrentCurrencyResponse{
  float USD = 1;
  float EUR = 2;
}