syntax = "proto3";

package subscription;

option go_package = "github.com/PavlentiyGo/notification-service/proto/subscription";

import "google/protobuf/timestamp.proto";

service SubscriptionService {
  rpc CreateSubscription(CreateSubscriptionRequest) returns (CreateSubscriptionResponse);
  rpc GetSubscriptions(GetSubscriptionsRequest) returns (GetSubscriptionsResponse);
  


}

message CreateSubscriptionRequest{
  User user = 1;

  int32 price = 2;
  Currency currency = 3;
  string name = 4;
  SubscriptionType type = 5;
  google.protobuf.Timestamp billing_at = 6;
}

message User {
  int32 id = 1;
  string user_name = 2;
  string first_name = 3;
  string second_name = 4;
}

enum Currency{
  CURRENCY_UNSPECIFIED = 0;

  RUB = 1;
  EUR = 2;
  USD = 3;
}
enum SubscriptionType {
  TYPE_UNSPECIFIED = 0;

  STREAMING = 1;   // Нетфликс, Яндекс Плюс, Спотифай
  SOFTWARE = 2;    // JetBrains, ChatGPT Plus, Облако
  UTILITIES = 3;   // ЖКХ, интернет, мобильная связь
  FINANCE = 4;     // Кредиты, страховки, банковское обслуживание
  HEALTH = 5;      // Фитнес-клуб, доставка здоровой еды, витамины
  EDUCATION = 6;   // Курсы, онлайн-школы, подписки на книги
  OTHER = 7;       // Всё остальное
}
message CreateSubscriptionResponse{
  int32 subscription_id = 1;

  int32 price = 2;
  Currency currency = 3;
  string name = 4;
  SubscriptionType type = 5;
  google.protobuf.Timestamp billing_at = 6;
}

message GetSubscriptionsRequest{
  int32 user_id = 1;
}

message GetSubscriptionsResponse{
  repeated CreateSubscriptionResponse subscriptions = 1;
}

message DeleteSubscriptionRequest{
  int32 subscription_id = 1;
}

message DeleteSubscriptionResponse{
}


message PatchSubscriptionRequest{

}
message PathSubscriptionResponse{

}

message PaySubscriptionRequest{

}
message PaySubscriptionResponse{

}